<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Boda</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="contenedor-subida">
      <h1>Sube tus fotos de la boda</h1>

      <div class="fila-botones">
        <button id="btn-galeria">Subir desde galería</button>
        <button id="btn-foto">Hacer foto</button>
      </div>
    </div>

    <!-- Inputs ocultos -->
    <input
      type="file"
      id="inputGaleria"
      accept="image/*"
      style="display: none"
    />
    <input
      type="file"
      id="inputCamara"
      accept="image/*"
      capture="camera"
      style="display: none"
    />

    <!-- Recuadro de información -->
    <div id="infoFoto" style="margin-top: 20px; font-size: 18px"></div>

    <!-- Botón SUBIR -->
    <div class="fila-aceptar">
      <button id="btn-grande">Aceptar</button>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
