<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Boda</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Sube tus fotos de la boda</h1>

    <button id="btnGaleria">Subir desde galería</button>
    <!-- Botón para abrir la galería -->
    <input
      type="file"
      id="inputGaleria"
      accept="image/*"
      style="display: none"
    />

    <button id="btnCamara">Hacer foto</button>
    <!-- Botón para abrir la cámara -->
    <input
      type="file"
      id="inputCamara"
      accept="image/*"
      capture="environment"
      style="display: none"
    />

    <!-- Recuadro de información -->
    <div id="infoFoto" style="margin-top: 20px; font-size: 18px"></div>

    <!-- Botón SUBIR -->
    <button id="btnSubir" style="margin-top: 20px">SUBIR</button>

    <script type="module" src="app.js"></script>
  </body>
</html>
